<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>
      {% if page.title and page.title != site.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}
    </title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}" />
    <link rel="icon" href="{{ '/assets/images/favicon.ico' | relative_url }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="{{ '/' | relative_url }}">
          <img
            class="brand-logo"
            src="{{ '/assets/images/logo.webp' | relative_url }}"
            alt="EFStudio logo"
            width="28"
            height="28"
          />
          <span class="brand-name">EFStudio</span>
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a href="https://github.com/Calesi19/EFStudio" class="nav-link">GitHub</a>
        </nav>
      </div>
    </header>

    <main class="site-main">{{ content }}</main>

    <footer class="site-footer">
      <div class="footer-inner">
        <p>EFStudio for .NET</p>
      </div>
    </footer>
    <script>
      document.querySelectorAll(".copy-btn").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var code = btn.closest(".code-copy-block").querySelector("code").innerText;
          navigator.clipboard.writeText(code).then(function () {
            btn.textContent = "Copied!";
            btn.classList.add("copied");
            setTimeout(function () {
              btn.textContent = "Copy";
              btn.classList.remove("copied");
            }, 2000);
          });
        });
      });
    </script>
  </body>
</html>
