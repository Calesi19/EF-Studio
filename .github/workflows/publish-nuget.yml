name: Publish NuGet Package

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Derive package version from release tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        working-directory: ./EFStudio/EFStudio.Core/client
        run: npm ci

      - name: Build frontend
        working-directory: ./EFStudio/EFStudio.Core/client
        run: npm run build

      - name: Restore dependencies
        run: dotnet restore EFStudio/EFStudio.sln

      - name: Build solution
        run: dotnet build EFStudio/EFStudio.sln --configuration Release --no-restore

      - name: Test solution
        run: dotnet test EFStudio/EFStudio.sln --configuration Release --no-build --verbosity normal

      - name: Pack NuGet package
        run: >
          dotnet pack EFStudio/EFStudio.Core/EFStudio.Core.csproj
          --configuration Release
          --no-build
          --output ./artifacts
          -p:PackageVersion=${{ env.PACKAGE_VERSION }}

      - name: Publish package to NuGet
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
