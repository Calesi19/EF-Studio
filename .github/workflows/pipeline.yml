name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      # 1. Build the React Frontend
      - name: Install Frontend Dependencies
        working-directory: ./EFStudio/EFStudio.Core/client
        run: npm ci

      - name: Build Frontend
        working-directory: ./EFStudio/EFStudio.Core/client
        run: npm run build

      # 2. Restore and Build .NET
      - name: Restore dependencies
        run: dotnet restore EFStudio/EFStudio.sln

      - name: Build Solution
        run: dotnet build EFStudio/EFStudio.sln --configuration Release --no-restore

      # 3. Run Unit Tests
      - name: Test
        run: dotnet test EFStudio/EFStudio.sln --configuration Release --no-build --verbosity normal
